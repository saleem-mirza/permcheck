name: release

# Cross-compile the permcheck binary for all supported plugin targets and
# publish them (plus a ready-to-use plugin bundle) to a GitHub Release.
#
# Triggers on a version tag (`v*`), or manually via workflow_dispatch with a tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: permcheck-darwin-arm64
            target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - name: permcheck-darwin-x64
            target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - name: permcheck-linux-x64
            target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - name: permcheck-linux-arm64
            target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - name: permcheck-windows-x64.exe
            target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/permcheck"
          [ "${{ runner.os }}" = "Windows" ] && src="${src}.exe"
          cp "$src" "dist/${{ matrix.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Assemble plugin bundle
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          # Populate the checked-out plugin (bin/ and rules/ hold only generated
          # content, gitignored) with every built binary and the canonical rules,
          # then zip a ready-to-install plugin.
          mkdir -p plugin/bin plugin/rules
          cp rules/permcheck.json plugin/rules/permcheck.json
          find artifacts -type f -name 'permcheck-*' -exec cp {} plugin/bin/ \;
          chmod +x plugin/bin/permcheck-darwin-* plugin/bin/permcheck-linux-* 2>/dev/null || true
          ( cd plugin && zip -rq "../permcheck-plugin-${tag}.zip" . )
          ls -l plugin/bin

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: permcheck ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/permcheck-*
            permcheck-plugin-*.zip

  # Push the source-free plugin bundle to the dedicated distribution repo
  # (saleem-mirza/marketplace) — the one marketplace users install from. Only
  # the plugin/ tree is refreshed; that repo owns its
  # .claude-plugin/marketplace.json (a relative "./plugin" source) and README,
  # which are carried over as-is. The default branch is rebuilt as an orphan
  # each release so superseded binaries don't accumulate in history.
  #
  # Cross-repo push is authenticated with a write DEPLOY KEY on
  # saleem-mirza/marketplace (repo-scoped, no expiry), whose private half is the
  # DIST_DEPLOY_KEY secret — the default GITHUB_TOKEN is scoped to this repo and
  # cannot push cross-repo.
  publish-marketplace:
    name: publish to marketplace repo
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo (for the plugin/ tree)
        uses: actions/checkout@v7

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish source-free bundle to marketplace repo
        env:
          DIST_DEPLOY_KEY: ${{ secrets.DIST_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi

          # Load the deploy key for all git-over-SSH in this step.
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DIST_DEPLOY_KEY" > ~/.ssh/dist_key
          chmod 600 ~/.ssh/dist_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/dist_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          git clone git@github.com:saleem-mirza/marketplace.git dist

          # New tree = the dist repo's own catalog + README (preserved), plus a
          # fresh plugin/ (source files from this repo + built binaries).
          rm -rf staging && mkdir -p staging
          cp -R dist/.claude-plugin staging/.claude-plugin
          cp dist/README.md staging/README.md 2>/dev/null || true
          mkdir -p plugin/rules
          cp rules/permcheck.json plugin/rules/permcheck.json   # generate the bundled rules copy
          cp -R plugin staging/plugin
          find artifacts -type f -name 'permcheck-*' -exec cp {} staging/plugin/bin/ \;
          chmod +x staging/plugin/bin/permcheck-darwin-* staging/plugin/bin/permcheck-linux-* 2>/dev/null || true

          cd dist
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release-tmp
          git rm -rf --quiet . >/dev/null 2>&1 || true
          cp -R ../staging/. .
          git add -A
          git commit -m "permcheck ${tag}: source-free plugin bundle"
          git branch -M release-tmp main
          git push -f origin main

  # Publish the Homebrew install path into the public, self-contained tap repo
  # saleem-mirza/homebrew-tap (the permcheck source repo is PRIVATE, so its own
  # release assets 404 for anonymous `brew` downloads). This job:
  #   1. publishes the prebuilt macOS binaries as RELEASE ASSETS on homebrew-tap
  #      (tag `v<version>`), which serve anonymous downloads;
  #   2. renders Formula/permcheck.rb (pinning those assets' sha256) and commits
  #      it into the same repo, so users can `brew install saleem-mirza/tap/permcheck`.
  #
  # Auth is PUBLISH_TOKEN — a fine-grained PAT with Contents: read/write on
  # saleem-mirza/homebrew-tap only. (A deploy key can't reach the Releases API.)
  publish-homebrew:
    name: publish Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo (for the formula template)
        uses: actions/checkout@v7

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish binaries + formula to the tap
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          TAP: saleem-mirza/homebrew-tap
        run: |
          set -euo pipefail

          # Fail fast with a clear message if the PAT secret is missing or blank
          # (e.g. `gh secret set` run non-interactively sets an empty value) —
          # otherwise gh fails later with an opaque "set GH_TOKEN" error.
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::PUBLISH_TOKEN secret is empty or unset. Set a fine-grained PAT with Contents: read/write on ${TAP}." >&2
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi
          version="${tag#v}"      # 0.1.11
          rel="v${version}"       # release tag on the tap repo

          arm64_bin="$(find artifacts -type f -name 'permcheck-darwin-arm64' | head -n1)"
          x64_bin="$(find artifacts -type f -name 'permcheck-darwin-x64' | head -n1)"

          # 1. Publish both macOS binaries as release assets on the tap repo
          #    (idempotent: create the release if absent, --clobber replaces on re-run).
          if ! gh release view "$rel" -R "$TAP" >/dev/null 2>&1; then
            gh release create "$rel" -R "$TAP" \
              --title "permcheck ${rel}" \
              --notes "permcheck ${rel} — prebuilt macOS binaries for the Homebrew formula."
          fi
          gh release upload "$rel" -R "$TAP" --clobber "$arm64_bin" "$x64_bin"

          # 2. Pin the just-published assets and render the formula.
          sha_arm64="$(sha256sum "$arm64_bin" | cut -d' ' -f1)"
          sha_x64="$(sha256sum "$x64_bin" | cut -d' ' -f1)"
          sed \
            -e "s/__VERSION__/${version}/g" \
            -e "s/__SHA_ARM64__/${sha_arm64}/g" \
            -e "s/__SHA_X64__/${sha_x64}/g" \
            homebrew/permcheck.rb.tmpl > permcheck.rb

          # 3. Commit the formula into the tap via the Contents API
          #    (create on first release, update thereafter).
          content_b64="$(base64 -w0 permcheck.rb)"
          existing_sha="$(gh api "repos/${TAP}/contents/Formula/permcheck.rb" \
            --jq .sha 2>/dev/null || true)"
          gh api -X PUT "repos/${TAP}/contents/Formula/permcheck.rb" \
            -f message="permcheck ${tag}: update formula" \
            -f content="$content_b64" \
            ${existing_sha:+-f sha="$existing_sha"}
